server:
  port: 8085

spring:
  application:
    name: course-service
  
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/microservices_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:admin}
    password: ${RABBITMQ_PASSWORD:admin}
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-change-in-production-min-32-chars}

file-service:
  url: ${FILE_SERVICE_URL:http://localhost:8081}

auth-service:
  url: ${AUTH_SERVICE_URL:http://localhost:8084}

rag:
  service:
    url: ${RAG_SERVICE_URL:http://localhost:8000}
    api-key: ${RAG_SERVICE_API_KEY:}
    # Resilience: timeout (seconds) and retry for RAG HTTP calls
    timeout: ${RAG_SERVICE_TIMEOUT:90}
    retry:
      max-attempts: ${RAG_SERVICE_RETRY_MAX_ATTEMPTS:3}
      first-backoff-ms: ${RAG_SERVICE_RETRY_FIRST_BACKOFF_MS:500}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    com.microservices: DEBUG
    org.springframework.web: INFO

